services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hitalent
      POSTGRES_PASSWORD: hitalent
      POSTGRES_DB: hitalent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitalent -d hitalent"]
      interval: 3s
      timeout: 5s
      retries: 20

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hitalent:hitalent@db:5432/hitalent
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
